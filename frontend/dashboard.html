<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

<style>
.dashboard {
  width: 750px;
  margin: 40px auto;
}

/* File row */
.file-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* Left side */
.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Thumbnail */
.preview {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* File name */
.name {
  color: #00c6ff;
  cursor: pointer;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Delete button */
.delete {
  background: red;
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  color: white;
  cursor: pointer;
}

/* Hide default input */
input[type="file"] {
  display: none;
}

/* Custom choose file button */
.file-label {
  display: block;
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  background: #f7f8f9;
  text-align: center;
  cursor: pointer;
  color: rgb(8, 0, 0);
  transition: 0.3s;
}

.file-label:hover {
  background: #0072ff;
}
</style>

</head>
<body>

<div class="dashboard">
  <h2>📁 Your Cloud Storage</h2>

  <!-- Custom file input -->
  <label class="file-label">
    Choose File
    <input type="file" id="file">
  </label>

  <!-- Show selected file name -->
  <p id="fileName"></p>

  <!-- Upload -->
  <button onclick="upload()">Upload</button>

  <!-- File list -->
  <div id="files"></div>

  <!-- Logout -->
  <button onclick="logout()">Logout</button>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Login first");
  location.href = "login.html";
}

// Show selected file name
document.getElementById("file").addEventListener("change", function() {
  document.getElementById("fileName").innerText =
    this.files[0]?.name || "";
});

// Logout
function logout() {
  localStorage.removeItem("token");
  location.href = "login.html";
}

// Upload
async function upload() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Select a file first");
    return;
  }

  const form = new FormData();
  form.append("file", file);

  await fetch("http://localhost:3000/upload", {
    method: "POST",
    headers: { Authorization: token },
    body: form
  });

  document.getElementById("fileName").innerText = "";
  alert("Uploaded!");
  getFiles();
}

// Load files
async function getFiles() {
  const res = await fetch("http://localhost:3000/files", {
    headers: { Authorization: token }
  });

  const data = await res.json();
  const container = document.getElementById("files");
  container.innerHTML = "";

  data.forEach(f => {

    // OPTIONAL: skip unwanted files like CSS
    if (f.filename.endsWith(".css")) return;

    const isImage = f.url.match(/\.(jpg|jpeg|png|gif)$/i);

    const div = document.createElement("div");
    div.className = "file-item";

    div.innerHTML = `
      <div class="left">
        ${isImage 
          ? `<img src="${f.url}" class="preview">`
          : `<span>📄</span>`}
        
        <span class="name" onclick="openFile('${f.url}')">
          ${f.filename}
        </span>
      </div>

      <button class="delete" onclick="del('${f._id}')">Delete</button>
    `;

    container.appendChild(div);
  });
}

// Open file
function openFile(url){
  window.open(url, "_blank");
}

// Delete
async function del(id) {
  await fetch("http://localhost:3000/delete/" + id, {
    method: "DELETE",
    headers: { Authorization: token }
  });

  getFiles();
}

// Initial load
getFiles();
</script>

</body>
</html>
